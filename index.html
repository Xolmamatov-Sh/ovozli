<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI - Ovozli Yordamchi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-microphone"></i> AI Ovozli Yordamchi</h1>
            <p>Ovozli buyruqlar orqali vaqtni bilish, musiqa ijro etish va qidiruv amallarini bajarish</p>
        </header>

        <main>
            <div class="assistant-card">
                <div class="status-indicator" id="statusIndicator">
                    <i class="fas fa-microphone-slash"></i>
                </div>
                
                <div class="wave-animation" id="waveAnimation">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>

                <div class="command-display" id="commandDisplay">
                    <p>Buyruq kutilmoqda...</p>
                </div>

                <div class="response-display" id="responseDisplay">
                    <p>Assistent javobi...</p>
                </div>

                <div class="controls">
                    <button id="recordBtn" class="record-btn">
                        <i class="fas fa-microphone"></i> Boshlash
                    </button>
                    
                    <select id="actionSelect" class="action-select">
                        <option value="all">Barcha amallar</option>
                        <option value="time">Vaqtni bilish</option>
                        <option value="music">Musiqa ijro etish</option>
                        <option value="search">Internetda qidirish</option>
                    </select>
                    
                </div>

                <div class="quick-commands">
                    <h3>Tezkor buyruqlar:</h3>
                    <div class="command-buttons">
                        <button class="cmd-btn" data-cmd="time">
                            <i class="fas fa-clock"></i> "Soat nechi?"
                        </button>
                        <button class="cmd-btn" data-cmd="music">
                            <i class="fas fa-music"></i> "Musiqa qo'y"
                        </button>
                        <button class="cmd-btn" data-cmd="search">
                            <i class="fas fa-search"></i> "Internetda qidir"
                        </button>
                    </div>
                </div>

                <div class="music-player hidden" id="musicPlayer">
                    <h4><i class="fas fa-play"></i> Musiqa ijro etilmoqda</h4>
                    <audio id="audioPlayer" controls>
                        <source src="" type="audio/mpeg">
                    </audio>
                </div>
            </div>

            <div class="history-section">
                <h3><i class="fas fa-history"></i> Buyruqlar tarixi</h3>
                <ul id="historyList" class="history-list"></ul>
            </div>
            <!-- Tezkor buyruqlar qismini kengaytiring -->
<div class="quick-commands">
    <h3>📋 Tezkor buyruqlar:</h3>
    <div class="command-buttons">
        <button class="cmd-btn" data-cmd="time"><i class="fas fa-clock"></i> "Soat nechi?"</button>
        <button class="cmd-btn" data-cmd="date"><i class="fas fa-calendar"></i> "Bugun qanaqa sana?"</button>
        <button class="cmd-btn" data-cmd="music"><i class="fas fa-music"></i> "Musiqa qo'y"</button>
        <button class="cmd-btn" data-cmd="weather"><i class="fas fa-cloud-sun"></i> "Ob-havo"</button>
        <button class="cmd-btn" data-cmd="news"><i class="fas fa-newspaper"></i> "Yangiliklar"</button>
        <button class="cmd-btn" data-cmd="joke"><i class="fas fa-smile"></i> "Hazil ayt"</button>
        <button class="cmd-btn" data-cmd="quote"><i class="fas fa-quote-right"></i> "Motivatsiya"</button>
        <button class="cmd-btn" data-cmd="currency"><i class="fas fa-dollar-sign"></i> "Valyuta kursi"</button>
        <button class="cmd-btn" data-cmd="football"><i class="fas fa-futbol"></i> "Futbol natijalari"</button>
        <button class="cmd-btn" data-cmd="movie"><i class="fas fa-film"></i> "Kino tavsiya"</button>
        <button class="cmd-btn" data-cmd="recipe"><i class="fas fa-utensils"></i> "Ovqat retsepti"</button>
        <button class="cmd-btn" data-cmd="help"><i class="fas fa-question-circle"></i> "Yordam"</button>
    </div>
</div>
        </main>

        <footer>
            <p>© 2026 AI Ovozli Yordamchi </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
